planner_client:
  ros__parameters:
    plan_solver_timeout: 400.0

planner:
  ros__parameters:
    plan_solver_timeout: 400.0
    plan_solver_plugins: ["POPF"]
    POPF:
      plugin: "plansys2/POPFPlanSolver"
    OPTIC:
      plugin: "plansys2/OPTICPlanSolver"
      arguments: "-N"

domain_expert:
  ros__parameters:
    validate_using_planner_node: false